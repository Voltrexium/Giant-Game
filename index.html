<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Swarm</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --text: #eaeaea;
      --muted: #8892b0;
      --accent: #4ecdc4;
      --danger: #ff6b6b;
      --pink: #e056fd;
      --cyan: #4ecdc4;
      --glow: rgba(78, 205, 196, 0.35);
      --board-max: 720px;
    }

    @media (min-width: 1024px) {
      :root { --board-max: 900px; }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1f2a44 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    body.is-active {
      overflow: hidden;
      touch-action: none;
    }

    .site-nav {
      width: 100%;
      flex-shrink: 0;
      background: #12182b;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .site-nav__link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.7rem max(1.25rem, env(safe-area-inset-left, 0px));
      padding-top: max(0.7rem, env(safe-area-inset-top, 0px));
      padding-right: max(1.25rem, env(safe-area-inset-right, 0px));
      font-size: 0.875rem;
      font-weight: 500;
      color: #9aa8c4;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .site-nav__link:hover {
      color: #c8d4e8;
    }

    .site-nav__link svg {
      flex-shrink: 0;
      opacity: 0.85;
    }

    main {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      padding-left: max(1rem, env(safe-area-inset-left, 0px));
      padding-right: max(1rem, env(safe-area-inset-right, 0px));
      padding-bottom: max(1rem, env(safe-area-inset-bottom, 0px));
    }

    @media (max-width: 640px) {
      main { padding: 0.5rem; padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0px)); }
      body.is-playing #game-header,
      body.is-playing #hud { display: none; }
    }

    header {
      width: min(100%, var(--board-max));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .stats {
      display: flex;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
    }

    .stat-pill strong { color: var(--accent); }

    #board-wrap {
      position: relative;
      width: min(100dvw - 2rem, var(--board-max));
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(78, 205, 196, 0.25);
      box-shadow: 0 0 40px var(--glow), inset 0 0 60px rgba(0, 0, 0, 0.35);
      background: #0d0d18;
      touch-action: none;
    }

    #board-wrap:fullscreen {
      width: 100vmin;
      height: 100vmin;
      max-width: none;
      border-radius: 0;
      border: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      outline: none;
    }

    canvas.canvas--pointer { cursor: crosshair; }
    canvas.canvas--keyboard { cursor: default; }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13, 13, 24, 0.82);
      backdrop-filter: blur(4px);
      padding: 1.5rem;
      text-align: center;
    }

    #overlay.hidden { display: none; }

    .panel {
      max-width: 360px;
      width: 100%;
    }

    .panel h2 {
      font-size: 1.35rem;
      margin-bottom: 0.5rem;
    }

    .panel p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }

    .legend {
      text-align: left;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    .legend span { display: inline-block; width: 0.75rem; height: 0.75rem; border-radius: 50%; margin-right: 0.35rem; vertical-align: middle; }

    .legend details {
      text-align: left;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    .legend details summary {
      cursor: pointer;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .legend--full { display: block; }
    .legend--compact { display: none; }

    @media (max-width: 640px) {
      .legend--full { display: none; }
      .legend--compact { display: block; }
    }

    .board-btn {
      position: absolute;
      z-index: 2;
      top: 0.5rem;
      min-width: 2.75rem;
      min-height: 2.75rem;
      padding: 0.45rem 0.65rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: rgba(22, 33, 62, 0.88);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1;
      backdrop-filter: blur(4px);
    }

    .board-btn--pause { right: 0.5rem; }
    .board-btn--fs { right: 3.5rem; }

    @media (max-width: 640px) {
      .board-btn {
        min-width: 3rem;
        min-height: 3rem;
      }
      .board-btn--fs { display: none; }
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    button {
      font: inherit;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    button:active { transform: scale(0.98); }

    @media (max-width: 640px) {
      button {
        min-height: 3rem;
        padding: 0.85rem 1rem;
      }
      .btn-row { gap: 0.75rem; }
    }

    .btn-primary {
      background: var(--accent);
      color: #0d1b1a;
      font-weight: 600;
      box-shadow: 0 0 20px var(--glow);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, 0.35);
    }

    #hud {
      width: min(100%, var(--board-max));
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
    }

    #status-pill {
      background: var(--surface);
      border: 1px solid var(--accent);
      box-shadow: 0 0 12px var(--glow);
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      color: var(--accent);
      font-weight: 600;
    }

    #help-text { color: var(--muted); }

    .earnings-pop {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1.25rem;
      animation: earnings-pop-in 0.45s ease-out;
    }

    .earnings-pop strong {
      font-size: 1.35rem;
      text-shadow: 0 0 16px var(--glow);
    }

    @keyframes earnings-pop-in {
      from { opacity: 0; transform: translateY(8px) scale(0.92); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .earnings-pop { animation: none; }
      button { transition: none; }
      .site-nav__link { transition: none; }
    }

    dialog {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      padding: 1.25rem;
      max-width: 320px;
    }

    dialog::backdrop { background: rgba(0, 0, 0, 0.6); }

    dialog menu {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Site navigation">
    <a href="/" class="site-nav__link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Portfolio
    </a>
  </nav>

  <main>
  <header id="game-header">
    <h1>Swarm</h1>
    <div class="stats">
      <div class="stat-pill">$ <strong id="money-display">0</strong></div>
      <div class="stat-pill">Best <strong id="high-score-display">0</strong></div>
    </div>
  </header>

  <div id="board-wrap">
    <button type="button" id="pause-btn" class="board-btn board-btn--pause" aria-label="Pause" hidden>Pause</button>
    <button type="button" id="fullscreen-btn" class="board-btn board-btn--fs" aria-label="Toggle fullscreen" hidden>Full</button>
    <canvas id="board" tabindex="0" aria-label="Swarm game board"></canvas>
    <div id="overlay">
      <div class="panel" id="overlay-panel"></div>
    </div>
  </div>

  <div id="hud">
    <div id="status-pill">Press Play to start</div>
    <div id="help-text">WASD / arrows or mouse · ESC to pause</div>
  </div>
  </main>

  <dialog id="leave-dialog">
    <p>Leave the current game?</p>
    <menu>
      <button type="button" class="btn-secondary" id="leave-cancel">Stay</button>
      <button type="button" class="btn-danger" id="leave-confirm">Leave</button>
    </menu>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
